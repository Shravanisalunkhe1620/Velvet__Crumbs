<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Velvet Crumbs | Pastry</title>

<style>
body{
  background:#fff5f7;
  color:#333;
  font-family:Arial, sans-serif;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.navbar{
  width:100%;
  background:#ff4d6d;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
}

.navbar h2{
  margin:0;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

.navbar a:hover{
  text-decoration:underline;
}


body{
  margin-top:80px;
}

.product{
  width:450px;
  padding:30px;
  background:white;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  text-align:center;
}

.product img{
  width:250px;
  border-radius:15px;
  margin-bottom:20px;
}

.price{
  font-size:28px;
  font-weight:bold;
  color:#ff4d6d;
  margin-bottom:15px;
}

.qty{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:15px;
  margin:10px 0;
}

.qty button{
  width:35px;
  height:35px;
  font-size:18px;
  cursor:pointer;
}

.cartBtn, .buy{
  width:100%;
  padding:12px;
  background:#ff4d6d;
  border:none;
  color:white;
  margin-top:10px;
  border-radius:25px;
  font-size:16px;
  cursor:pointer;
}

.checkout-box{
  margin-top:20px;
  padding:20px;
  background:#f4f4f4;
  border-radius:10px;
  display:none;
  text-align:left;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

.payment label{
  display:block;
  margin:5px 0;
}

.paymentBox{
  display:none;
  margin-top:10px;
  padding:10px;
  background:white;
  border-radius:6px;
}

.place{
  margin-top:10px;
  padding:12px;
  width:100%;
  background:#ff4d6d;
  border:none;
  color:white;
  border-radius:20px;
  font-size:16px;
  cursor:pointer;
}
</style>
</head>

<body>

  <div class="navbar">
  <h2>Velvet Crumbs</h2>
  <div class="links">
    <a href="#" onclick="goBack()">⬅ Back</a>
    <a href="Index0.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>
</div>

<div class="product">

<h2 id="productName">Black Forest Pastry</h2>
<img src="Black_Forest_Pastry.jpg" alt="Black Forest Pastry">

<div id="price" class="price">Rs. 90</div>

<h3>Quantity</h3>
<div class="qty">
  <button onclick="minus()">-</button>
  <span id="qty">1</span>
  <button onclick="plus()">+</button>
</div>

<button class="cartBtn" onclick="addToCart()">Add to Cart</button>
<button class="buy" onclick="buyNow()">Buy it now</button>

<div id="checkoutBox" class="checkout-box">
  <h3>Checkout</h3>
  <p>Product: <span id="checkProduct"></span></p>
  <p id="checkQty"></p>
  <p id="checkPrice"></p>

  <h3>Contact</h3>
  <input id="email" type="email" placeholder="Email">

  <h3>Delivery</h3>
  <input id="fname" type="text" placeholder="First Name">
  <input id="lname" type="text" placeholder="Last Name">
  <input id="address" type="text" placeholder="Address">
  <input id="city" type="text" placeholder="City">
  <input id="pin" type="text" placeholder="PIN Code">
  <input id="phone" type="text" placeholder="Phone Number">

  <h3>Payment Method</h3>
  <div class="payment">
    <label><input type="radio" name="pay" onclick="showPay('upiBox')"> UPI</label>
    <label><input type="radio" name="pay" onclick="showPay('cardBox')"> Card</label>
    <label><input type="radio" name="pay" onclick="showPay('codBox')"> Cash on Delivery</label>
  </div>

  <div id="upiBox" class="paymentBox">
    Scan QR to Pay<br><br>
    <img src="GooglePay_QR.png" width="150">
  </div>

  <div id="cardBox" class="paymentBox">
    <input placeholder="Card Number">
    <input placeholder="Expiry MM/YY">
    <input placeholder="CVV">
  </div>

  <div id="codBox" class="paymentBox">
    Pay when order is delivered.
  </div>

  <button class="place" onclick="placeOrder()">Place Order</button>
</div>

</div>

<script>

let basePrice = 90;
let qty = 1;

function updatePrice(){
  let total = basePrice * qty;
  document.getElementById("price").innerText = "Rs. " + total;
}

function plus(){
  qty++;
  document.getElementById("qty").innerText = qty;
  updatePrice();
}

function goBack(){
  if(document.referrer !== ""){
    window.history.back()
  } else {
    window.location.href = "Ppastrys.html"
  }
}

function minus(){
  if(qty>1){
    qty--;
    document.getElementById("qty").innerText = qty;
    updatePrice();
  }
}

function addToCart(){
  let total = basePrice * qty;
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  cart.push({
    name: document.getElementById("productName").innerText,
    qty: qty,
    price: total
  });

  localStorage.setItem("cart", JSON.stringify(cart));
  alert("🛒 Added to cart!");
}

function buyNow(){
  let total = basePrice * qty;

  document.getElementById("checkoutBox").style.display = "block";
  document.getElementById("checkProduct").innerText =
    document.getElementById("productName").innerText;
  document.getElementById("checkQty").innerText = "Quantity: " + qty;
  document.getElementById("checkPrice").innerText = "Total Price: Rs. " + total;

  window.scrollTo(0, document.body.scrollHeight);
}

function showPay(id){
  document.getElementById("upiBox").style.display="none";
  document.getElementById("cardBox").style.display="none";
  document.getElementById("codBox").style.display="none";
  document.getElementById(id).style.display="block";
}

function placeOrder(){

if(!validateCheckout()){
return
}

alert("✅ Order placed successfully!")

localStorage.removeItem("cart")

window.location.href = "success.html"

}

</script>
<script src="common.js"></script>

</body>
</html>
