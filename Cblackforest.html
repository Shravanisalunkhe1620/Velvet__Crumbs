<head>

<style>

body{

.navbar h2{

/* content khali shift karayla */
body{
  margin-top:80px;
}
.product{
  background:white;
  width:850px;
  padding:40px;
  border-radius:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.15);

  width:300px;
  border-radius:15px;
}

.price{
  font-size:35px;

  background:#ffe4ea;

}

.qty button{
  width:35px;

}

.buy,.cartBtn{
  width:100%;
  padding:15px;

}

.checkout{
  display:none;
  background:#f4f4f4;
  padding:20px;

  border-radius:10px;
  text-align:left;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.paymentBox{
  display:none;
  background:#fff;
  padding:10px;
  margin-top:10px;
  border-radius:6px;
}

.place{
  margin-top:10px;
  padding:12px;
  background:#ff4d6d;
  border:none;
  color:white;
  width:100%;
  border-radius:20px;
  cursor:pointer;
}

</style>
</head>

<body>
  <div class="navbar">
  <h2>Velvet Crumbs</h2>
  <div class="links">
    <a href="#" onclick="goBack()">⬅ Back</a>
    <a href="Index0.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>
</div>

<div class="product">

<h2>Black Forest Cake</h2>

<img src="blackForest.jpg">

<div id="price" class="price">Rs. 599</div>

<h3>Weight</h3>

<div class="weight">
<button class="active" onclick="setWeight(450,this)">450 gm</button>
<button onclick="setWeight(1000,this)">1 kg</button>
<button onclick="setWeight(1500,this)">1.5 kg</button>
<button onclick="setWeight(2000,this)">2 kg</button>
</div>

<h3>Quantity</h3>

<div class="qty">
<button onclick="minus()">-</button>
<span id="qty">1</span>
<button onclick="plus()">+</button>
</div>

<button class="cartBtn" onclick="addToCart()">Add to Cart</button>
<button class="buy" onclick="openCheckout()">Buy it now</button>

<div id="checkout" class="checkout">

<h3>Checkout</h3>
<p id="orderInfo"></p>

<h3>Contact</h3>
<input id="email" placeholder="Email">

<h3>Delivery</h3>
<input id="name" placeholder="Full Name">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="phone" placeholder="Phone">

<h3>Payment Method</h3>

<label><input type="radio" name="pay" onclick="showPay('upi')"> UPI</label>
<label><input type="radio" name="pay" onclick="showPay('card')"> Card</label>
<label><input type="radio" name="pay" onclick="showPay('cod')"> Cash on Delivery</label>

<!-- UPI -->
<div id="upi" class="paymentBox">
<input id="upiId" placeholder="example@upi">
<button onclick="payUPI()">Pay via UPI</button>
</div>

<!-- Card -->
<div id="card" class="paymentBox">
<input placeholder="Card Number">
<input placeholder="Expiry">
<input placeholder="CVV">
</div>

<!-- COD -->
<div id="cod" class="paymentBox">
Pay when order is delivered.
</div>

<button class="place" onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

let price=599
let weight=450
let qty=1

function setWeight(w,btn){
  weight=w

  document.querySelectorAll(".weight button").forEach(b=>b.classList.remove("active"))
  btn.classList.add("active")

  updatePrice()
}

function goBack(){
  if(document.referrer !== ""){
    window.history.back()
  } else {
    window.location.href = "Pcake.html"
  }
}

function plus(){
  qty++
  document.getElementById("qty").innerText=qty
  updatePrice()
}

function minus(){
  if(qty>1){
    qty--
    document.getElementById("qty").innerText=qty
    updatePrice()
  }
}

function updatePrice(){
  let total=price*(weight/450)*qty
  document.getElementById("price").innerText="Rs. "+Math.round(total)
}

function addToCart(){

  let total=price*(weight/450)*qty

  let cart=JSON.parse(localStorage.getItem("cart")) || []

  cart.push({
    name:"Black Forest Cake",
    weight:weight,
    qty:qty,
    price:Math.round(total)
  })

  localStorage.setItem("cart",JSON.stringify(cart))

  alert("🛒 Added to cart!")
}

function openCheckout(){

  document.getElementById("checkout").style.display="block"

  let total=price*(weight/450)*qty

  document.getElementById("orderInfo").innerText=
  "Weight: "+weight+" gm | Qty: "+qty+" | Total: Rs. "+Math.round(total)
}

function showPay(type){
  document.getElementById("upi").style.display="none"
  document.getElementById("card").style.display="none"
  document.getElementById("cod").style.display="none"

  document.getElementById(type).style.display="block"
}

function payUPI(){

  let upi=document.getElementById("upiId").value

  if(upi==""){
    alert("Enter UPI ID")
    return
  }

  let total=price*(weight/450)*qty

  let url="upi://pay?pa="+upi+"&pn=VelvetCrumbs&am="+Math.round(total)+"&cu=INR"

  window.location.href=url
}

function placeOrder(){

if(!validateCheckout()){
return
}

alert("✅ Order placed successfully!")

localStorage.removeItem("cart")

window.location.href = "success.html"

}

</script>
<script src="common.js"></script>
</body>
</html>
