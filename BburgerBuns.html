<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Velvet Crumbs</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
  background:#fff5f7;
  font-family:Arial;
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.navbar{
  width:100%;
  background:#ff4d6d;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
}

.navbar h2{
  margin:0;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

.product{
  width:450px;
  padding:30px;
  background:white;
  border-radius:15px;
  box-shadow:0 8px 20px rgba(0,0,0,0.15);
  text-align:center;
}

.product img{
  width:250px;
  border-radius:15px;
}

.price{
  font-size:28px;
  font-weight:bold;
  color:#ff4d6d;
}

.qty{
  display:flex;
  justify-content:center;
  gap:15px;
  margin:10px 0;
}

.qty button{
  width:35px;
  height:35px;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border:none;
  background:#ff4d6d;
  color:white;
  border-radius:20px;
  cursor:pointer;
}

.checkout-box{
  display:none;
  margin-top:20px;
  background:#f4f4f4;
  padding:15px;
  border-radius:10px;
}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}

.paymentBox{
  display:none;
  padding:10px;
  background:white;
  border-radius:6px;
  margin-top:10px;
}

#reader{
  width:200px;
  margin:auto;
}
</style>
</head>

<body>
<div class="navbar">
  <h2>Velvet Crumbs</h2>
  <div class="links">
    <a href="#" onclick="goBack()">⬅ Back</a>
    <a href="Index0.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>
</div>
<div class="product">

<h2 id="productName">Burger Buns</h2>
<img src="burger-buns.jpg">
<div id="price">Rs. 70</div>

<h3>Quantity</h3>
<div class="qty">
<button onclick="minus()">-</button>
<span id="qty">1</span>
<button onclick="plus()">+</button>
</div>

<button onclick="addToCart()">Add to Cart</button>
<button onclick="buyNow()">Buy Now</button>

<div id="checkoutBox" class="checkout-box">

<h3>Checkout</h3>
<p>Product: <span id="checkProduct"></span></p>
<p id="checkQty"></p>
<p id="checkPrice"></p>

<input id="email" type="email" placeholder="Email">

<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pin" placeholder="PIN Code">
<input id="phone" placeholder="Phone Number">

<h3>Payment</h3>

<label><input type="radio" name="pay" onclick="showPay('upiBox')"> UPI</label>
<label><input type="radio" name="pay" onclick="showPay('cardBox')"> Card</label>
<label><input type="radio" name="pay" onclick="showPay('codBox')"> COD</label>

<div id="upiBox" class="paymentBox">
<img src="GooglePay_QR.png" width="150">
<button onclick="markPaid()">I have paid</button>
</div>

<div id="cardBox" class="paymentBox">
<input id="cardNum" placeholder="Card Number">
<input id="exp" placeholder="Expiry">
<input id="cvv" placeholder="CVV">
<button onclick="cardPay()">Pay Now</button>
</div>

<div id="codBox" class="paymentBox">
Pay on Delivery
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

let basePrice=70, qty=1;
let paid=false;

function updatePrice(){
  document.getElementById("price").innerText="Rs. "+(basePrice*qty);
}

function plus(){qty++;update();}
function minus(){if(qty>1){qty--;update();}}

function update(){
  document.getElementById("qty").innerText=qty;
  updatePrice();
}

function addToCart(){
  alert("Added to cart!");
}
function goBack(){
  if(document.referrer !== ""){
    window.history.back()
  } else {
    window.location.href = "Breads&Rolls.html"
  }
}

function buyNow(){
  checkoutBox.style.display="block";
  checkProduct.innerText=productName.innerText;
  checkQty.innerText="Quantity: "+qty;
  checkPrice.innerText="Total: Rs. "+(basePrice*qty);
}

function showPay(id){
  upiBox.style.display="none";
  cardBox.style.display="none";
  codBox.style.display="none";
  document.getElementById(id).style.display="block";
}

function markPaid(){
  paid=true;
  alert("Payment successful");
}

function cardPay(){
  if(cardNum.value==""||exp.value==""||cvv.value==""){
    alert("Fill card details");
    return;
  }
  paid=true;
  alert("Payment successful");
}

function placeOrder(){

if(!validateCheckout()){
return
}

alert("✅ Order placed successfully!")

localStorage.removeItem("cart")

window.location.href = "success.html"

}

</script>
<script src="common.js"></script>
</body>
</html>
