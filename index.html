<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velvet Crumbs | Login</title>

<style>

/* RESET */
*{
 margin:0;
 padding:0;
 box-sizing:border-box;
}

/* BODY */
body{
 font-family:Arial;

 /* BACKGROUND IMAGE */
 background:url("oo.jpg") no-repeat center center/cover;

 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 position:relative;
 overflow:hidden;
}

/* BLUR OVERLAY */
body::before{
 content:"";
 position:absolute;
 top:0;
 left:0;
 width:100%;
 height:100%;
 background:rgba(0,0,0,0.45);
 backdrop-filter:blur(10px);
 z-index:1;
}

/* LOGIN BOX */
.login-box{
 position:relative;
 z-index:2;
 width:360px;
 padding:45px 35px;
 border-radius:20px;

 background:rgba(255,255,255,0.12);
 backdrop-filter:blur(15px);

 box-shadow:0 15px 35px rgba(0,0,0,0.4);
 text-align:center;
 color:white;
}

/* TITLE */
.title{
 font-size:28px;
 font-weight:bold;
 margin-bottom:25px;
 line-height:1.4;
}

/* INPUT */
.input-box{
 margin:18px 0;
}

.input-box input{
 width:100%;
 padding:14px;
 border-radius:25px;
 border:1px solid rgba(255,255,255,0.3);

 background:rgba(255,255,255,0.2);
 color:white;
 font-size:14px;
 transition:0.3s;
}

/* FOCUS */
.input-box input:focus{
 border-color:#ff4d6d;
 background:rgba(255,255,255,0.3);
 outline:none;
}

/* PLACEHOLDER */
.input-box input::placeholder{
 color:#eee;
}

/* BUTTON */
.login-btn{
 width:100%;
 padding:14px;
 margin-top:10px;

 background:linear-gradient(45deg,#ff4d6d,#ff758f);
 border:none;
 border-radius:25px;

 font-size:16px;
 color:white;
 cursor:pointer;
 transition:0.3s;
}

.login-btn:hover{
 transform:scale(1.05);
}

/* REGISTER */
.register{
 margin-top:15px;
 font-size:14px;
}

.register a{
 color:#fff;
 font-weight:bold;
 text-decoration:underline;
}

/* SHOW PASSWORD */
.show-pass{
 margin-top:5px;
 font-size:13px;
 cursor:pointer;
 color:#ddd;
}

</style>
</head>

<body>

<div class="login-box">

<div class="title">🍰 Velvet Crumbs<br>Login</div>

<form action="Index0.html" onsubmit="return loginCheck()">

<div class="input-box">
<input type="text" id="username" placeholder="Enter Username" required>
</div>

<div class="input-box">
<input type="password" id="password" placeholder="Enter Password" required>
<div class="show-pass" onclick="togglePass()">👁 Show Password</div>
</div>

<button type="submit" class="login-btn">Login</button>

<p class="register">Don't have an account? <a href="#">Register</a></p>

</form>
</div>

<script>

/* SHOW PASSWORD */
function togglePass(){
 let pass = document.getElementById("password");
 pass.type = (pass.type === "password") ? "text" : "password";
}

/* SIMPLE LOGIN (NO HARDCODED USER/PASS) */
function loginCheck(){
 let user = document.getElementById("username").value;
 let pass = document.getElementById("password").value;

 if(user !== "" && pass !== ""){
   alert("✅ Login Successful!");
   return true; // redirects to Index0.html
 } else {
   alert("❌ Please enter username and password");
   return false;
 }
}

</script>

</body>
</html>
