body{
  font-family: Arial, sans-serif;
  background:#f5f5f5;

}

header{
 background:#ff4d6d;
  color:white;
  padding:15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

header h1{
  margin:0;
}

header .cart{
  color:white;
  text-decoration:none;
  font-weight:bold;
}


/* TITLE */

h2{

/* SEARCH */

.search{

.search input{
  padding:10px;
  width:250px;
  border-radius:20px;
  border:1px solid #ccc;
}

/* PRODUCTS */

.products{
  padding:15px;
  display:flex;
  flex-wrap: wrap;
  justify-content:center;
  gap:20px;
}

.products a{
  text-decoration:none;
  color:inherit;
}

.card{
  background:white;
  border-radius:15px;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  width:180px;
  transition: transform 0.2s, box-shadow 0.2s;
}

.card:hover{
  transform: translateY(-5px);
  box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.card img{
  width:150px;
  height:150px;
  object-fit:cover;
  border-radius:10px;
}

.card h3{
  margin:10px 0 5px 0;
  font-size:16px;
}

.price{
  color:#b45f06;
  font-weight:bold;
}

/* BACK BUTTON */

.back{
  text-align:center;
  margin:30px;
}

.back a{
  text-decoration:none;
  color:white;
  background:#b45f06;
  padding:10px 20px;
  border-radius:10px;
}

</style>
