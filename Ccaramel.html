<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Velvet Crumbs | Caramel Cake</title>

<style>

body{
background:#fff5f7;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.navbar{
  width:100%;
  background:#ff4d6d;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
}

.navbar h2{
  margin:0;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

.navbar a:hover{
  text-decoration:underline;
}


body{
  margin-top:80px;
}
.product{
width:850px;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
text-align:center;
}

.product img{
width:280px;
border-radius:12px;
margin-bottom:20px;
}

.price{
font-size:34px;
font-weight:bold;
color:#ff4d6d;
}

.tax{
font-size:14px;
color:#777;
}

.weight button{
background:white;
border:1px solid #ddd;
padding:10px 18px;
margin:5px;
border-radius:25px;
cursor:pointer;
}

.active{
background:#ffe4ea;
border:1px solid #ff4d6d;
}

.qty{
display:flex;
justify-content:center;
align-items:center;
gap:10px;
margin:10px 0;
}

.qty button{
width:35px;
height:35px;
font-size:18px;
cursor:pointer;
}

textarea{
width:100%;
height:80px;
border-radius:8px;
border:1px solid #ccc;
padding:10px;
}

.buy, .cartBtn{
width:100%;
padding:14px;
background:#ff4d6d;
border:none;
color:white;
border-radius:25px;
font-size:18px;
margin-top:10px;
cursor:pointer;
}

.checkout{
margin-top:25px;
background:#f4f4f4;
padding:20px;
border-radius:10px;
display:none;
text-align:left;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}

.place{
width:100%;
padding:12px;
background:#ff4d6d;
border:none;
color:white;
border-radius:20px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

.payment label{
display:block;
margin:5px 0;
}

.extra{
display:none;
margin-top:10px;
}

</style>
</head>

<body>
<div class="navbar">
  <h2>Velvet Crumbs</h2>
  <div class="links">
    <a href="#" onclick="goBack()">⬅ Back</a>
    <a href="Index0.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>
</div>
<div class="product">

<h2>Caramel Cake</h2>

<img src="Salted-Caramel-Cake.webp">

<div id="price" class="price">Rs. 579</div>
<p class="tax">Incl. of all taxes</p>

<h3>Weight</h3>

<div class="weight">
<button class="active" onclick="setWeight(450)">450 gm</button>
<button onclick="setWeight(1000)">1 kg</button>
<button onclick="setWeight(1500)">1.5 kg</button>
<button onclick="setWeight(2000)">2 kg</button>
<button onclick="setWeight(3000)">3 kg</button>
</div>

<h3>Quantity</h3>

<div class="qty">
<button onclick="minus()">-</button>
<span id="qty">1</span>
<button onclick="plus()">+</button>
</div>

<h3>Order Notes</h3>

<textarea id="notes" placeholder="Notes about your order"></textarea>

<button class="cartBtn" onclick="addToCart()">Add to Cart</button>
<button class="buy" onclick="buyNow()">Buy it now</button>

<div id="checkout" class="checkout">

<h3>Checkout</h3>

<p id="checkWeight"></p>
<p id="checkQty"></p>
<p id="checkPrice"></p>
<p id="checkNotes"></p>

<input id="email" placeholder="Email">
<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pin" maxlength="6" placeholder="PIN Code">
<input id="phone" maxlength="10" placeholder="Phone Number">

<h3>Payment Method</h3>

<label><input type="radio" name="payment" onclick="showPay('upi')"> UPI</label>
<label><input type="radio" name="payment" onclick="showPay('card')"> Card</label>
<label><input type="radio" name="payment" onclick="showPay('cod')"> Cash on Delivery</label>

<div id="upi" class="extra">
<h4>Scan QR to Pay</h4>
<img src="GooglePay_QR.png" width="150">
</div>

<div id="card" class="extra">
<input placeholder="Card Number">
<input placeholder="Expiry (MM/YY)">
<input placeholder="CVV">
</div>

<p id="cod" class="extra">
Payment will be collected at delivery.
</p>

<button class="place" onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

let basePrice=579
let weight=450
let qty=1

function setWeight(w){
weight=w

let buttons=document.querySelectorAll(".weight button")
buttons.forEach(b=>b.classList.remove("active"))

event.target.classList.add("active")

updatePrice()
}

function updatePrice(){
let total=basePrice*(weight/450)*qty
document.getElementById("price").innerText="Rs. "+Math.round(total)
}

function plus(){
if(qty<10){
qty++
document.getElementById("qty").innerText=qty
updatePrice()
}
}

function goBack(){
  if(document.referrer !== ""){
    window.history.back()
  } else {
    window.location.href = "Pcake.html"
  }
}

function minus(){
if(qty>1){
qty--
document.getElementById("qty").innerText=qty
updatePrice()
}
}

function addToCart(){

let total=basePrice*(weight/450)*qty

let cart=JSON.parse(localStorage.getItem("cart")) || []

cart.push({
name:"Caramel Cake",
weight:weight,
qty:qty,
price:Math.round(total)
})

localStorage.setItem("cart",JSON.stringify(cart))

alert("🛒 Caramel Cake added to cart!")
}

function buyNow(){

let total=basePrice*(weight/450)*qty
let notes=document.getElementById("notes").value

document.getElementById("checkout").style.display="block"

document.getElementById("checkWeight").innerText="Weight : "+weight+" gm"
document.getElementById("checkQty").innerText="Quantity : "+qty
document.getElementById("checkPrice").innerText="Total Price : Rs. "+Math.round(total)
document.getElementById("checkNotes").innerText="Notes : "+notes
}

function showPay(type){

document.getElementById("upi").style.display="none"
document.getElementById("card").style.display="none"
document.getElementById("cod").style.display="none"

document.getElementById(type).style.display="block"
}

function placeOrder(){

if(!validateCheckout()){
return
}

alert("✅ Order placed successfully!")

localStorage.removeItem("cart")

window.location.href = "success.html"

}

</script>
<script src="common.js"></script>

</body>
</html>
