<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Velvet Crumbs | Muffin</title>

<style>
body{
background:#fff5f7;
font-family:Arial;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.navbar{
  width:100%;
  background:#ff4d6d;
  color:white;
  padding:15px 30px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  position:fixed;
  top:0;
  left:0;
}

.navbar h2{
  margin:0;
}

.navbar a{
  color:white;
  text-decoration:none;
  margin-left:20px;
  font-weight:bold;
}

.navbar a:hover{
  text-decoration:underline;
}


body{
  margin-top:80px;
}

.product{
width:450px;
padding:30px;
background:white;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
text-align:center;
}

.product img{
width:250px;
border-radius:15px;
margin-bottom:20px;
}

.price{
font-size:28px;
font-weight:bold;
color:#ff4d6d;
}

.qty{
display:flex;
justify-content:center;
gap:15px;
margin:10px 0;
}

.qty button{
width:35px;
height:35px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
background:#ff4d6d;
color:white;
border-radius:20px;
cursor:pointer;
}

.checkout-box{
display:none;
margin-top:20px;
background:#f4f4f4;
padding:15px;
border-radius:10px;
text-align:left;
}

input{
width:100%;
padding:10px;
margin:5px 0;
}

.paymentBox{
display:none;
background:white;
padding:10px;
border-radius:6px;
margin-top:10px;
}
</style>
</head>

<body>
<div class="navbar">
  <h2>Velvet Crumbs</h2>
  <div class="links">
    <a href="#" onclick="goBack()">⬅ Back</a>
    <a href="Index0.html">Home</a>
    <a href="cart.html">Cart</a>
    <a href="orders.html">Orders</a>
  </div>
</div>
<div class="product">

<h2 id="productName">Chocolate Muffin</h2>
<img src="chocolate-muffins.jpg">

<div id="price" class="price">Rs. 90</div>

<h3>Quantity</h3>
<div class="qty">
<button onclick="minus()">-</button>
<span id="qty">1</span>
<button onclick="plus()">+</button>
</div>

<button onclick="addToCart()">Add to Cart</button>
<button onclick="buyNow()">Buy Now</button>

<div id="checkoutBox" class="checkout-box">

<h3>Checkout</h3>
<p>Product: <span id="checkProduct"></span></p>
<p id="checkQty"></p>
<p id="checkPrice"></p>

<h3>Contact</h3>
<input id="email" type="email" placeholder="Email">

<h3>Delivery</h3>
<input id="fname" placeholder="First Name">
<input id="lname" placeholder="Last Name">
<input id="address" placeholder="Address">
<input id="city" placeholder="City">
<input id="pin" placeholder="PIN Code">
<input id="phone" placeholder="Phone Number">

<h3>Payment</h3>

<label><input type="radio" name="pay" value="upi" onclick="showPay('upiBox')"> UPI</label>
<label><input type="radio" name="pay" value="card" onclick="showPay('cardBox')"> Card</label>
<label><input type="radio" name="pay" value="cod" onclick="showPay('codBox')"> COD</label>

<!-- UPI -->
<div id="upiBox" class="paymentBox">
Scan QR<br><br>
<img src="GooglePay_QR.png" width="150"><br><br>
<button onclick="markPaid()">I have paid</button>
</div>

<!-- CARD -->
<div id="cardBox" class="paymentBox">
<input id="cardNum" placeholder="Card Number">
<input id="exp" placeholder="Expiry MM/YY">
<input id="cvv" placeholder="CVV">
<button onclick="cardPay()">Pay Now</button>
</div>

<!-- COD -->
<div id="codBox" class="paymentBox">
Pay on delivery
</div>

<button onclick="placeOrder()">Place Order</button>

</div>

</div>

<script>

let basePrice=90;
let qty=1;
let paid=false;

// PRICE
function updatePrice(){
document.getElementById("price").innerText="Rs. "+(basePrice*qty);
}

function goBack(){
  if(document.referrer !== ""){
    window.history.back()
  } else {
    window.location.href = "PMuffins&Fruitcakes.html"
  }
}

// QTY
function plus(){qty++;update();}
function minus(){if(qty>1){qty--;update();}}
function update(){
document.getElementById("qty").innerText=qty;
updatePrice();
}

// CART
function addToCart(){
let cart=JSON.parse(localStorage.getItem("cart"))||[];

cart.push({
name:productName.innerText,
qty:qty,
price:basePrice*qty
});

localStorage.setItem("cart",JSON.stringify(cart));
alert(" Added to cart!");
}

// BUY
function buyNow(){
checkoutBox.style.display="block";

checkProduct.innerText=productName.innerText;
checkQty.innerText="Quantity: "+qty;
checkPrice.innerText="Total: Rs. "+(basePrice*qty);
}

// PAYMENT UI
function showPay(id){
upiBox.style.display="none";
cardBox.style.display="none";
codBox.style.display="none";
document.getElementById(id).style.display="block";
}

// UPI
function markPaid(){
paid=true;
alert("✅ Payment done (UPI)");
}

// CARD
function cardPay(){
if(cardNum.value==""||exp.value==""||cvv.value==""){
alert("Fill card details");
return;
}
paid=true;
alert("✅ Payment done (Card)");
}

// ORDER
function placeOrder(){

if(!validateCheckout()){
return
}

alert("✅ Order placed successfully!")

localStorage.removeItem("cart")

window.location.href = "success.html"

}
</script>
<script src="common.js"></script>
</body>
</html>
